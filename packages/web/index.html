<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" sizes="180x180" href="/borsa-logo.webp" />
    <link rel="apple-touch-icon" href="/borsa-logo.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Borsa</title>
    <!-- تطبيق الثيم فورًا قبل React عشان نمنع الصفحة البيضاء -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme') || 'system';
          var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <style>
      html, body { margin: 0; padding: 0; min-height: 100vh; background-color: #f8f9fa; }
      html.dark, html.dark body { background-color: #0d1117; }
      #root { min-height: 100vh; }
      /* Loading indicator قبل React */
      #app-splash {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: inherit; z-index: 9999; transition: opacity 0.2s;
      }
      .app-splash-spinner {
        width: 40px; height: 40px; border-radius: 50%;
        border: 4px solid #7c3aed; border-top-color: transparent;
        animation: app-spin 0.8s linear infinite;
      }
      @keyframes app-spin { to { transform: rotate(360deg); } }
    </style>
    <script async src="https://pay.google.com/gp/p/js/pay.js"></script>
  </head>
  <body>
    <div id="app-splash"><div class="app-splash-spinner"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      setTimeout(function() {
        var s = document.getElementById('app-splash');
        if (s) { s.style.opacity = '0'; s.style.pointerEvents = 'none'; setTimeout(function(){ if (s && s.parentNode) s.parentNode.removeChild(s); }, 300); }
      }, 8000);
    </script>
  </body>
</html>
