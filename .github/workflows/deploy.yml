name: Deploy

on:
  push:
    branches: [main, develop]

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          npm run build
        env:
          NODE_ENV: production
          VITE_SENTRY_DSN: ${{ secrets.STAGING_SENTRY_DSN }}

      - name: Run DB Migrations (Staging)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Build & Push Docker Image (Staging)
        run: |
          docker build -t ${{ secrets.DOCKER_REGISTRY }}/borsa-api:staging-${{ github.sha }} .
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ${{ secrets.DOCKER_REGISTRY }} -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker push ${{ secrets.DOCKER_REGISTRY }}/borsa-api:staging-${{ github.sha }}
          docker tag ${{ secrets.DOCKER_REGISTRY }}/borsa-api:staging-${{ github.sha }} ${{ secrets.DOCKER_REGISTRY }}/borsa-api:staging
          docker push ${{ secrets.DOCKER_REGISTRY }}/borsa-api:staging

      - name: Deploy to Staging Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_REGISTRY }}/borsa-api:staging
            docker stop borsa-api-staging || true
            docker rm borsa-api-staging || true
            docker run -d \
              --name borsa-api-staging \
              --restart unless-stopped \
              -p 3001:3000 \
              --env-file /home/${{ secrets.STAGING_USER }}/borsa/.env.staging \
              ${{ secrets.DOCKER_REGISTRY }}/borsa-api:staging

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          npm run build
        env:
          NODE_ENV: production
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Run DB Migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build & Push Docker Image (Production)
        run: |
          docker build -t ${{ secrets.DOCKER_REGISTRY }}/borsa-api:${{ github.sha }} .
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ${{ secrets.DOCKER_REGISTRY }} -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker push ${{ secrets.DOCKER_REGISTRY }}/borsa-api:${{ github.sha }}
          docker tag ${{ secrets.DOCKER_REGISTRY }}/borsa-api:${{ github.sha }} ${{ secrets.DOCKER_REGISTRY }}/borsa-api:latest
          docker push ${{ secrets.DOCKER_REGISTRY }}/borsa-api:latest

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_REGISTRY }}/borsa-api:latest
            docker stop borsa-api || true
            docker rm borsa-api || true
            docker run -d \
              --name borsa-api \
              --restart unless-stopped \
              -p 3000:3000 \
              --env-file /home/${{ secrets.PROD_USER }}/borsa/.env \
              ${{ secrets.DOCKER_REGISTRY }}/borsa-api:latest

      - name: Notify Sentry of Release
        run: |
          npx @sentry/cli releases new ${{ github.sha }}
          npx @sentry/cli releases set-commits ${{ github.sha }} --auto
          npx @sentry/cli releases finalize ${{ github.sha }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        continue-on-error: true
